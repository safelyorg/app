<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Safely Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="css/dashboard.css" />
    </head>
    <body
        class="bg-zinc-950 text-zinc-100 h-screen flex overflow-hidden text-sm"
    >
        <!-- hidden state controls -->
        <input
            type="radio"
            name="view"
            id="view-history"
            class="hidden"
            checked
        />
        <input type="radio" name="view" id="view-reports" class="hidden" />
        <input
            type="radio"
            name="riskfilter"
            id="risk-all"
            class="hidden"
            checked
        />
        <input type="radio" name="riskfilter" id="risk-low" class="hidden" />
        <input
            type="radio"
            name="riskfilter"
            id="risk-caution"
            class="hidden"
        />
        <input type="radio" name="riskfilter" id="risk-high" class="hidden" />

        <div
            id="login-gate"
            class="w-full h-full flex flex-col items-center justify-center gap-4 text-center px-6"
        >
            <div class="text-xl font-black">Safely</div>
            <div class="text-zinc-400 text-sm max-w-xs">
                You need to sign in to view your dashboard.
            </div>
            <a
                href="/"
                class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-white text-black text-sm font-bold hover:bg-zinc-200 transition"
                >Go to sign in</a
            >
        </div>

        <div id="app" class="hidden flex-1 flex h-full w-full">
            <!-- SIDEBAR -->
            <aside
                class="w-56 h-full bg-gradient-to-b from-zinc-900 to-zinc-950 border-r border-white/10 flex flex-col p-3 flex-shrink-0"
            >
                <div
                    class="text-xl font-black tracking-tight px-3 pb-5 border-b border-white/10 mb-4"
                >
                    Safely
                </div>
                <nav class="flex flex-col gap-1 flex-1">
                    <label
                        for="view-history"
                        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold text-zinc-400 hover:bg-zinc-900 hover:text-zinc-200 cursor-pointer transition"
                    >
                        <svg
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M3 3v5h5" />
                            <path d="M3.05 13A9 9 0 106 5.3L3 8" />
                            <path d="M12 7v5l4 2" />
                        </svg>
                        History
                    </label>
                    <label
                        for="view-reports"
                        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold text-zinc-400 hover:bg-zinc-900 hover:text-zinc-200 cursor-pointer transition"
                    >
                        <svg
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"
                            />
                            <path d="M9 15l3 3 6-6" />
                        </svg>
                        My Reports
                    </label>
                </nav>

                <!-- user menu: native <details>/<summary>, zero JS, same disclosure pattern as the landing page's FAQ -->
                <details class="mt-auto pt-4 border-t border-white/10 relative">
                    <summary
                        class="list-none flex items-center gap-3 px-3 py-2.5 rounded-lg text-zinc-400 hover:bg-zinc-900 cursor-pointer"
                    >
                        <span
                            class="w-8 h-8 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center flex-shrink-0"
                        >
                            <svg
                                width="15"
                                height="15"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
                                />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </span>
                        <span class="flex flex-col text-left">
                            <span class="text-xs font-bold text-zinc-100"
                                >Bilal Khan</span
                            >
                            <span class="text-[11px] text-zinc-500"
                                >Buyer Account</span
                            >
                        </span>
                    </summary>
                    <div
                        class="absolute bottom-full mb-2 left-0 w-48 bg-zinc-800 border border-white/10 rounded-xl p-1.5 shadow-2xl"
                    >
                        <a
                            href="#"
                            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold hover:bg-white/5"
                            >Settings</a
                        >
                        <a
                            href="#"
                            id="btnLogout"
                            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold text-rose-400 hover:bg-white/5 border-t border-white/5 mt-1 pt-3"
                            >Log out</a
                        >
                    </div>
                </details>
            </aside>

            <!-- HISTORY PANEL -->
            <main id="panel-history" class="flex-1 overflow-y-auto p-8">
                <div class="w-full">
                    <div
                        class="flex items-baseline gap-5 mb-5 pb-4 border-b border-white/5"
                    >
                        <div class="flex items-baseline gap-1.5">
                            <span class="text-xl font-black">5</span
                            ><span
                                class="text-[11px] font-semibold text-zinc-500 uppercase tracking-wide"
                                >Checked</span
                            >
                        </div>
                        <div class="flex items-baseline gap-1.5">
                            <span class="text-xl font-black">2</span
                            ><span
                                class="text-[11px] font-semibold text-zinc-500 uppercase tracking-wide"
                                >Reported</span
                            >
                        </div>
                    </div>

                    <div
                        class="flex justify-between items-center mb-3.5 gap-3 flex-wrap"
                    >
                        <h2 class="text-sm font-extrabold">Analysis History</h2>
                        <div class="flex gap-2 flex-wrap items-center">
                            <input
                                id="search-box"
                                type="text"
                                placeholder="Search seller or listing..."
                                class="px-3 py-1.5 bg-zinc-900 border border-white/10 rounded-lg text-xs font-medium w-48 outline-none focus:border-sky-500"
                            />
                            <div
                                class="flex gap-1 bg-zinc-900 border border-white/10 rounded-lg p-1"
                            >
                                <label
                                    for="risk-all"
                                    class="px-2.5 py-1 rounded-md text-[11px] font-bold text-zinc-400 cursor-pointer"
                                    >All</label
                                >
                                <label
                                    for="risk-low"
                                    class="px-2.5 py-1 rounded-md text-[11px] font-bold text-zinc-400 cursor-pointer"
                                    >Low</label
                                >
                                <label
                                    for="risk-caution"
                                    class="px-2.5 py-1 rounded-md text-[11px] font-bold text-zinc-400 cursor-pointer"
                                    >Caution</label
                                >
                                <label
                                    for="risk-high"
                                    class="px-2.5 py-1 rounded-md text-[11px] font-bold text-zinc-400 cursor-pointer"
                                    >High</label
                                >
                            </div>
                        </div>
                    </div>

                    <div
                        class="bg-zinc-900 border border-white/10 rounded-2xl overflow-hidden shadow"
                    >
                        <table class="w-full">
                            <thead>
                                <tr
                                    class="text-left text-[11px] font-extrabold uppercase tracking-wide text-zinc-500 bg-zinc-900 border-b border-white/5"
                                >
                                    <th class="px-3 py-2.5">Date</th>
                                    <th class="px-3 py-2.5">Listing</th>
                                    <th class="px-3 py-2.5">Risk</th>
                                    <th class="px-3 py-2.5">Reported</th>
                                </tr>
                            </thead>
                            <tbody id="history-rows"></tbody>
                        </table>
                    </div>
                </div>
            </main>

            <!-- REPORTS PANEL -->
            <main id="panel-reports" class="flex-1 overflow-y-auto p-8">
                <div class="w-full">
                    <h2 class="text-sm font-extrabold mb-3.5">Fraud Reports</h2>
                    <div
                        class="bg-zinc-900 border border-white/10 rounded-2xl overflow-hidden shadow"
                    >
                        <table class="w-full">
                            <thead>
                                <tr
                                    class="text-left text-[11px] font-extrabold uppercase tracking-wide text-zinc-500 bg-zinc-900 border-b border-white/5"
                                >
                                    <th class="px-3 py-2.5">Date</th>
                                    <th class="px-3 py-2.5">Reason</th>
                                    <th class="px-3 py-2.5">Listing</th>
                                    <th class="px-3 py-2.5">Seller</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </main>

        <!-- ===== DETAIL OVERLAYS ===== -->

        <!--
            Single dynamic detail panel. Populated by openDetail() in dashboard.js
            based on whichever row was clicked. Replaces what used to be 5
            separate hand-written overlays (one per mock listing) - that approach
            doesn't scale to a real, arbitrarily-sized list of listings, so this
            is filled in with JS instead.
        -->
        <div id="detail-view" class="hidden fixed inset-y-0 left-56 right-0 bg-zinc-950 z-50 overflow-y-auto p-8">
            <div class="w-full max-w-xl mx-auto">
            <div class="flex items-center gap-3 mb-5">
                <button id="detail-close" class="text-zinc-400 text-xs font-semibold hover:text-white cursor-pointer">&larr; Back</button>
                <div id="detail-title" class="text-base font-extrabold truncate flex-1"></div>
            </div>

            <div class="bg-zinc-900 border border-white/10 rounded-xl p-4 mb-4">
                <div class="flex justify-between py-1.5 text-sm"><span class="text-zinc-500">Seller</span><span id="detail-seller" class="font-semibold"></span></div>
                <div class="flex justify-between py-1.5 text-sm"><span class="text-zinc-500">Platform</span><span id="detail-platform" class="font-semibold capitalize"></span></div>
                <div class="flex justify-between py-1.5 text-sm"><span class="text-zinc-500">Date</span><span id="detail-date" class="font-semibold"></span></div>
            </div>

            <div id="detail-risk-block" class="hidden">
                <div class="text-center py-6">
                <div id="detail-risk-score" class="text-3xl font-extrabold"></div>
                <div id="detail-risk-level" class="text-sm font-bold text-zinc-400 mt-1"></div>
                </div>
                <div class="bg-zinc-900 border border-white/10 rounded-xl p-3 text-sm text-zinc-400">
                <span id="detail-reported"></span>
                </div>
            </div>

            <div id="detail-report-block" class="hidden mt-4 bg-zinc-900 border border-white/10 rounded-xl p-4">
                <div class="text-[11px] font-extrabold uppercase text-zinc-500 mb-1">Report reason</div>
                <div id="detail-report-reason" class="text-sm font-semibold"></div>
            </div>
            </div>
        </div>

        <script src="js/dashboard.js"></script>
    </body>
</html>
